apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-memoryoss-config
data:
  memoryoss.toml: |
    [server]
    host = "{{ .Values.config.serverHost }}"
    port = {{ .Values.config.serverPort }}

    [tls]
    enabled = {{ .Values.config.tlsEnabled }}
    auto_generate = {{ .Values.config.tlsAutoGenerate }}
    {{- if .Values.config.tlsCertPath }}
    cert_path = "{{ .Values.config.tlsCertPath }}"
    {{- end }}
    {{- if .Values.config.tlsKeyPath }}
    key_path = "{{ .Values.config.tlsKeyPath }}"
    {{- end }}
    {{- if .Values.config.tlsClientCaPath }}
    client_ca_path = "{{ .Values.config.tlsClientCaPath }}"
    {{- end }}

    [storage]
    data_dir = "{{ .Values.config.dataDir }}"

    [auth]
    {{- range .Values.auth.apiKeys }}
    [[auth.api_keys]]
    key = "{{ .key }}"
    role = "{{ .role }}"
    namespace = "{{ .namespace }}"
    {{- end }}
