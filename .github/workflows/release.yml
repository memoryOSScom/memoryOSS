name: Release

on:
  push:
    tags: ["v*"]

env:
  GHCR_IMAGE: ghcr.io/memoryosscom/memoryoss

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      artifact_retention_days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: repo

      - name: Prepare release notes
        shell: bash
        run: |
          notes="repo/docs/releases/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes" ]; then
            echo "missing release notes file: $notes" >&2
            exit 1
          fi
          cp "$notes" release-notes.md

      - name: Resolve release channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta.* || "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            *.tar.gz
            *.zip
            *.sha256

      - name: Create Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          body_path: release-notes.md
          prerelease: ${{ steps.channel.outputs.prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: |
            *.tar.gz
            *.zip
            *.sha256
            memoryoss-mcp-*.json
            release-notes.md

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
      - name: Publish to crates.io
        run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-container:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Resolve container channel
        id: channel
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-beta.* || "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            echo "channel_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "channel_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push container image
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          VERSION="${VERSION#v}"
          if [ -z "$BUILD_DATE" ]; then
            BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          IMAGE="${GHCR_IMAGE}"
          TAG_ONE="${IMAGE}:${VERSION}"
          TAG_TWO="${IMAGE}:${{ steps.channel.outputs.channel_tag }}"

          docker build \
            --build-arg VERSION="$VERSION" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="$BUILD_DATE" \
            -t "${TAG_ONE}" \
            .

          if [ -n "${TAG_TWO}" ]; then
            docker tag "${TAG_ONE}" "${TAG_TWO}"
          fi

          docker push "${TAG_ONE}"
          docker push "${TAG_TWO}"
