name: Release Smoke

on:
  push:
    branches:
      - "smoke/**"
  workflow_dispatch:
    inputs:
      push_container:
        description: "Push a smoke container image to GHCR"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE_SMOKE: ghcr.io/memoryosscom/memoryoss-smoke

jobs:
  build:
    uses: ./.github/workflows/build-release-artifacts.yml
    with:
      artifact_retention_days: 14

  publish-container:
    needs: build
    if: ${{ inputs.push_container }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push smoke container image
        env:
          VERSION: smoke-${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          IMAGE="${GHCR_IMAGE_SMOKE}"
          TAG="${IMAGE}:${VERSION}"

          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            -t "${TAG}" \
            .

          docker push "${TAG}"
