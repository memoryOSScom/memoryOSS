name: Release Smoke

on:
  workflow_dispatch:
    inputs:
      push_container:
        description: "Push a smoke container image to GHCR"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-smoke-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_IMAGE_SMOKE: ghcr.io/memoryosscom/memoryoss-smoke

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: memoryoss-linux-x86_64
            archive_name: memoryoss-linux-x86_64.tar.gz
            sha_name: memoryoss-linux-x86_64.tar.gz.sha256
            binary_name: memoryoss
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: memoryoss-linux-aarch64
            archive_name: memoryoss-linux-aarch64.tar.gz
            sha_name: memoryoss-linux-aarch64.tar.gz.sha256
            binary_name: memoryoss
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: memoryoss-darwin-x86_64
            archive_name: memoryoss-darwin-x86_64.tar.gz
            sha_name: memoryoss-darwin-x86_64.tar.gz.sha256
            binary_name: memoryoss
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: memoryoss-darwin-aarch64
            archive_name: memoryoss-darwin-aarch64.tar.gz
            sha_name: memoryoss-darwin-aarch64.tar.gz.sha256
            binary_name: memoryoss
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: memoryoss-windows-x86_64
            archive_name: memoryoss-windows-x86_64.zip
            sha_name: memoryoss-windows-x86_64.zip.sha256
            binary_name: memoryoss.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive_name }} ${{ matrix.binary_name }}
          cd ../../..
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.archive_name }} > ${{ matrix.sha_name }}
          else
            shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.sha_name }}
          fi

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = Join-Path 'target' '${{ matrix.target }}'
          $releaseDir = Join-Path $releaseDir 'release'
          $binaryPath = Join-Path $releaseDir '${{ matrix.binary_name }}'
          $archivePath = '${{ matrix.archive_name }}'
          $hashPath = '${{ matrix.sha_name }}'

          if (Test-Path $archivePath) {
            Remove-Item $archivePath
          }

          Compress-Archive -Path $binaryPath -DestinationPath $archivePath -CompressionLevel Optimal

          $hash = (Get-FileHash -Path $archivePath -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path $hashPath -Value "$hash  $archivePath"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.sha_name }}
          retention-days: 14

  publish-container:
    needs: build
    if: ${{ inputs.push_container }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push smoke container image
        env:
          VERSION: smoke-${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          IMAGE="${GHCR_IMAGE_SMOKE}"
          TAG="${IMAGE}:${VERSION}"

          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg VCS_REF="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${BUILD_DATE}" \
            -t "${TAG}" \
            .

          docker push "${TAG}"
